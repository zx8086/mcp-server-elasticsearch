# Horizontal Pod Autoscaler for Elasticsearch MCP Server
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: elasticsearch-mcp-server-hpa
  namespace: elasticsearch-mcp
  labels:
    app.kubernetes.io/name: elasticsearch-mcp-server
    app.kubernetes.io/component: hpa
    app.kubernetes.io/part-of: mcp-ecosystem
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: elasticsearch-mcp-server
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # Scale based on number of requests per second (if metrics available)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "100"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    
    scaleUp:
      stabilizationWindowSeconds: 60  # 1 minute
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: elasticsearch-mcp-server-pdb
  namespace: elasticsearch-mcp
  labels:
    app.kubernetes.io/name: elasticsearch-mcp-server
    app.kubernetes.io/component: pdb
    app.kubernetes.io/part-of: mcp-ecosystem
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: elasticsearch-mcp-server