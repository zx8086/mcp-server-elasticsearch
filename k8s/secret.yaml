# Secret for sensitive Elasticsearch MCP Server configuration
# Note: Base64 encode your actual values before applying
# Example: echo -n "your-secret-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-mcp-secrets
  namespace: elasticsearch-mcp
  labels:
    app.kubernetes.io/name: elasticsearch-mcp-server
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: mcp-ecosystem
type: Opaque
data:
  # Elasticsearch Authentication (base64 encoded)
  # Choose one authentication method:
  
  # Method 1: API Key Authentication (recommended)
  ES_API_KEY: ""  # Base64 encoded API key
  
  # Method 2: Username/Password Authentication  
  ES_USERNAME: ""  # Base64 encoded username
  ES_PASSWORD: ""  # Base64 encoded password
  
  # Optional: LangSmith API Key
  LANGSMITH_API_KEY: ""  # Base64 encoded LangSmith API key
  
  # Optional: Custom CA Certificate
  # ES_CA_CERT: ""  # Base64 encoded CA certificate content

---
# Example of how to create secrets via kubectl:
# kubectl create secret generic elasticsearch-mcp-secrets \
#   --namespace=elasticsearch-mcp \
#   --from-literal=ES_API_KEY="your_actual_api_key" \
#   --from-literal=LANGSMITH_API_KEY="your_langsmith_key"